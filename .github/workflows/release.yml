name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to package, e.g. v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run compile
      - run: npm test
      - run: npm run package

      - name: Get version from tag
        id: version
        run: |
          tag="${{ inputs.tag }}"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Package vsix
        run: npx vsce package -o note-md-${{ steps.version.outputs.version }}.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: note-md-${{ steps.version.outputs.version }}.vsix
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, 'beta') || startsWith(steps.version.outputs.version, '0.') }}

  publish-marketplace:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run compile
      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish
        continue-on-error: true
